name: Release Bundle

on:
  workflow_dispatch:
    inputs:
      bundle_id:
        description: Bundle identifier, for example sprint-24
        required: true
        type: string
      commit_list:
        description: Space-separated commit SHAs from release branch
        required: true
        type: string

jobs:
  bundle:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com

      - name: Prepare bundle branch
        run: |
          git fetch origin --prune
          git checkout release
          git pull --ff-only origin release
          git checkout -b bundle/${{ inputs.bundle_id }}
          git cherry-pick --no-commit ${{ inputs.commit_list }}
          git commit -m "release(${{ inputs.bundle_id }}): bundled story promotion"

      - name: Push bundle branch
        run: git push origin HEAD